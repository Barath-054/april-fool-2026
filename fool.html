<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>April Fool 2026 🎉</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Comic+Neue:wght@700&family=Roboto:wght@400;500&display=swap');

        body {
            margin: 0;
            font-family: 'Roboto', sans-serif;
            background: linear-gradient(135deg, #ff6b6b, #4ecdc4);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        .card {
            background: white;
            padding: 40px 30px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.3);
            text-align: center;
            width: 340px;
            position: relative;
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        h1 {
            font-family: 'Comic Neue', cursive;
            font-size: 2.4rem;
            color: #e63946;
            margin: 0 0 15px 0;
        }

        p {
            font-size: 1.1rem;
            color: #333;
            margin: 15px 0;
        }

        button {
            margin-top: 20px;
            padding: 14px 28px;
            border: none;
            background: #25D366;
            color: white;
            border-radius: 50px;
            cursor: pointer;
            font-size: 1.1rem;
            font-weight: 600;
            transition: all 0.3s ease;
            box-shadow: 0 6px 15px rgba(37, 211, 102, 0.4);
        }

        button:hover {
            background: #1eb355;
            transform: scale(1.08);
        }

        #result {
            margin-top: 25px;
            font-size: 1.3rem;
            font-weight: bold;
            min-height: 80px;
            padding: 15px;
            border-radius: 12px;
            transition: all 0.4s ease;
        }

        .emoji {
            font-size: 3.5rem;
            display: block;
            margin: 15px 0;
            animation: spin 0.8s linear;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Outward Explosion Confetti */
        .confetti {
            position: fixed;
            width: 11px;
            height: 11px;
            border-radius: 50%;
            z-index: 9999;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div class="card" id="card">
        <h1>April Fool 2026 🎉</h1>
        <p style="font-size:1.2rem;">I tried so hard to make you an April Fool today...</p>
       
        <button onclick="revealTruth()">Click to know why I failed 😌</button>
       
        <div id="result"></div>
    </div>

    <script>
        function createCenterExplosion() {
            const centerX = window.innerWidth / 2;
            const centerY = window.innerHeight / 2 - 50; // Slightly above center to target the result area

            const colors = ['#ff6b6b', '#4ecdc4', '#45b7d1', '#96ceb4', '#ffe66d', '#f7d794', '#e17055', '#6c5ce7', '#fd79a8'];

            for (let i = 0; i < 180; i++) {   // More particles for rich explosion
                const confetti = document.createElement('div');
                confetti.classList.add('confetti');

                confetti.style.left = centerX + 'px';
                confetti.style.top = centerY + 'px';
                confetti.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];

                const size = Math.random() * 8 + 7;
                confetti.style.width = size + 'px';
                confetti.style.height = size + 'px';

                // Random angle and distance
                const angle = Math.random() * Math.PI * 2;
                const velocity = Math.random() * 220 + 180; // Speed of explosion
                const duration = Math.random() * 2.2 + 2.8;

                const tx = Math.cos(angle) * velocity;
                const ty = Math.sin(angle) * velocity - 80; // Slight upward bias

                confetti.style.transition = `transform ${duration}s cubic-bezier(0.25, 0.1, 0.25, 1), opacity ${duration}s ease-out`;
                confetti.style.transform = 'scale(0.2)';

                document.body.appendChild(confetti);

                // Trigger explosion
                setTimeout(() => {
                    confetti.style.transform = `translate(${tx}px, ${ty}px) scale(1) rotate(${Math.random() * 800 - 400}deg)`;
                    confetti.style.opacity = '0';
                }, 50);

                // Remove after animation
                setTimeout(() => {
                    confetti.remove();
                }, duration * 1000 + 200);
            }
        }

        function revealTruth() {
            const result = document.getElementById('result');
            const card = document.getElementById('card');
           
            result.innerHTML = `
                <span class="emoji">🤡</span>
                <span style="color:#e63946;">Because you are already a certified fool! 😜</span><br><br>
                <small style="color:#555; font-size:0.95rem;">
                    Congratulations! You've won the "Born Yesterday" award 🏆<br>
                    (No refunds, no take-backs)
                </small>
            `;
           
            // Visual feedback
            card.style.background = '#fffbeb';
            card.style.border = '3px solid #ffd93d';
           
            // Trigger explosion from center
            createCenterExplosion();
           
            // Card shake effect
            card.style.animation = 'none';
            setTimeout(() => {
                card.style.animation = 'float 0.4s ease-in-out 3';
            }, 10);
        }

        // Light initial burst on load
        window.onload = () => {
            setTimeout(() => {
                const centerX = window.innerWidth / 2;
                const centerY = window.innerHeight / 2;
                
                for (let i = 0; i < 40; i++) {
                    const confetti = document.createElement('div');
                    confetti.classList.add('confetti');
                    confetti.style.left = centerX + 'px';
                    confetti.style.top = centerY + 'px';
                    confetti.style.backgroundColor = '#4ecdc4';
                    confetti.style.width = confetti.style.height = '9px';
                    confetti.style.transition = 'all 2.5s ease-out';
                    document.body.appendChild(confetti);

                    setTimeout(() => {
                        const angle = Math.random() * Math.PI * 2;
                        const dist = Math.random() * 120 + 80;
                        confetti.style.transform = `translate(${Math.cos(angle)*dist}px, ${Math.sin(angle)*dist}px) scale(0.6)`;
                        confetti.style.opacity = '0';
                    }, 100);
                }
            }, 700);
        };
    </script>
</body>
</html>
